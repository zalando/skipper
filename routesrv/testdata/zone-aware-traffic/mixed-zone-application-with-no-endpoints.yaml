apiVersion: v1
kind: Service
metadata:
  labels:
    app: app-with-endpoints
  name: svc-with-endpoints
spec:
  clusterIP: 10.3.190.1
  ports:
    - name: web
      port: 80
      protocol: TCP
      targetPort: 8080
  selector:
    app: app-with-endpoints
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: app-without-endpoints
  name: svc-without-endpoints
spec:
  clusterIP: 10.3.190.2
  ports:
    - name: web
      port: 80
      protocol: TCP
      targetPort: 8080
  selector:
    app: app-without-endpoints
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  labels:
    app: app-with-endpoints
  name: ingress-with-endpoints
  namespace: default
spec:
  rules:
    - host: above.example.org
      http:
        paths:
          - backend:
              service:
                name: svc-with-endpoints
                port:
                  number: 80
            pathType: ImplementationSpecific
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  labels:
    app: app-without-endpoints
  name: ingress-without-endpoints
  namespace: default
spec:
  rules:
    - host: below.example.org
      http:
        paths:
          - backend:
              service:
                name: svc-without-endpoints
                port:
                  number: 80
            pathType: ImplementationSpecific
---
# svc-with-endpoints: 3 endpoints in eu-central-1a — meets minEndpointsByZone
apiVersion: v1
kind: EndpointSlice
metadata:
  labels:
    app: app-with-endpoints
    kubernetes.io/service-name: svc-with-endpoints
  name: svc-with-endpoints-eps
  namespace: default
endpoints:
  - addresses:
    - 10.3.0.3
    zone: eu-central-1a
  - addresses:
    - 10.3.0.4
    zone: eu-central-1a
  - addresses:
    - 10.3.0.5
    zone: eu-central-1a
  - addresses:
    - 10.3.1.3
    zone: eu-central-1b
  - addresses:
    - 10.3.2.3
    zone: eu-central-1b
  - addresses:
    - 10.3.2.4
    zone: eu-central-1b
ports:
  - name: web
    port: 8080
    protocol: TCP
apiVersion: v1
---
# svc-without-endpoints: only 2 endpoints in eu-central-1a — below minEndpointsByZone
apiVersion: v1
kind: EndpointSlice
metadata:
  labels:
    app: app-without-endpoints
    kubernetes.io/service-name: svc-without-endpoints
  name: svc-without-endpoints-eps
  namespace: default
endpoints: []
ports:
  - name: web
    port: 8080
    protocol: TCP
apiVersion: v1
