apiVersion: v1
kind: Service
metadata:
  labels:
    app: app-above-threshold
  name: svc-above-threshold
spec:
  clusterIP: 10.3.190.1
  ports:
    - name: web
      port: 80
      protocol: TCP
      targetPort: 8080
  selector:
    app: app-above-threshold
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  labels:
    app: app-above-threshold
  name: ingress-above-threshold
  namespace: default
spec:
  rules:
    - host: above.example.org
      http:
        paths:
          - backend:
              service:
                name: svc-above-threshold
                port:
                  number: 80
            pathType: ImplementationSpecific
---
apiVersion: v1
kind: EndpointSlice
metadata:
  labels:
    app: app-above-threshold
    kubernetes.io/service-name: svc-above-threshold
  name: svc-above-threshold-eps
  namespace: default
endpoints:
  - addresses:
    - 10.3.0.3
    zone: eu-central-1a
  - addresses:
    - 10.3.0.4
    zone: eu-central-1a
  - addresses:
    - 10.3.0.5
    zone: eu-central-1a
  - addresses:
    - 10.3.1.3
    zone: eu-central-1b
  - addresses:
    - 10.3.1.4
    zone: eu-central-1b
  - addresses:
    - 10.3.1.5
    zone: eu-central-1b
ports:
  - name: web
    port: 8080
    protocol: TCP
apiVersion: v1
